version: '3.8'

services:
  app:
    build: ./app
    ports:
      - "5002:5000"
    env_file:
      - ./app/.env
    networks:
      - observability

  prometheus:
    image: prom/prometheus:latest
    container_name: landing-prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    networks:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP over HTTP (для приёма трейсов)
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana 
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - observability

  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=https://outrank-casket-turtle.ngrok-free.dev
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - observability     

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  grafana-data:
  n8n_data: