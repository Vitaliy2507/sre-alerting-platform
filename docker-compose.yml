version: '3.8'

services:
  app:
    build: ./app
    ports:
      - "127.0.0.1:5002:5000"
    env_file:
      - ./app/.env
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: landing-prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    networks:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.57.0
    ports:
      - "127.0.0.1:16686:16686"   # UI
      - "127.0.0.1:4318:4318"     # OTLP over HTTP
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    networks:
      - observability

  n8n:
    image: n8nio/n8n:1.48.0
    container_name: n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_SECURE_COOKIE=true
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.8.1
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  grafana-data:
  n8n_data:
