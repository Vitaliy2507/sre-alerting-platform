scrape_configs:
  - job_name: 'landing'
    scrape_interval: 5s
    static_configs:
      - targets: ['app:5000']
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']